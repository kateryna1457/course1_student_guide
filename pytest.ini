[pytest]
# Pytest конфігурація для проекту Student Directory

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Директорії для пошуку тестів
testpaths = tests

# Мінімальна версія pytest
minversion = 8.0

# Опції за замовчуванням
addopts =
    # Вивід
    -v                          # Verbose output
    --tb=short                  # Shorter traceback format
    --strict-markers            # Помилка для незареєстрованих markers

    # Покриття коду
    --cov=src                   # Покриття директорії src
    --cov-report=html           # HTML звіт
    --cov-report=term-missing   # Показати пропущені рядки в терміналі
    --cov-report=term:skip-covered  # Не показувати повністю покриті файли

    # Warnings
    -W ignore::DeprecationWarning

    # Performance
    --maxfail=5                 # Зупинитися після 5 помилок

# Markers для категоризації тестів
markers =
    integration: Integration tests that require database connection
    slow: Tests that take longer than 1 second to run
    api: Tests for REST API endpoints
    cli: Tests for CLI interface
    unit: Unit tests that don't require external dependencies

# Console output formatting
console_output_style = progress

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage настройки
[coverage:run]
source = src
omit =
    */tests/*
    */venv/*
    */.venv/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    # Виключити з покриття
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
